<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SNT Pro - Gestión Nacional Datatrack</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #002b5c; --accent: #00d2ff; --danger: #dc3545; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header & Auth */
        .header { background: var(--primary); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1100; }
        .auth-zone { display: flex; gap: 10px; align-items: center; }
        
        .main-content { display: flex; flex: 1; position: relative; overflow: hidden; }
        #mapAgenda { flex: 1; z-index: 1; }

        /* Panel Lateral */
        .floating-panel { position: absolute; top: 20px; right: 20px; width: 360px; max-height: 85%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 15px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; padding: 15px; }
        .tech-list { overflow-y: auto; flex: 1; padding-right: 5px; }
        
        /* Cards */
        .tech-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px; border: 1px solid #eee; transition: 0.3s; position: relative; }
        .tech-card.active { border: 2px solid #28a745; background: #f0fff4; }
        .tech-card h4 { margin: 0; color: var(--primary); font-size: 16px; }
        .tech-card p { margin: 3px 0; font-size: 13px; color: #666; }
        
        /* Controles de Admin (Ocultos por defecto) */
        .admin-controls { display: none; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; gap: 5px; justify-content: flex-end; }
        .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; color: white; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-del { background: var(--danger); }

        /* Modales */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 3% auto; padding: 25px; width: 450px; border-radius: 15px; position: relative; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .full { grid-column: span 2; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.2em; font-weight: bold;">DATATRACK | RED TÉCNICA</div>
    <div class="auth-zone">
        <button id="btnNewTech" class="btn-sm" style="background:var(--accent); display:none;" onclick="abrirModal()">➕ Nuevo Técnico</button>
        <button id="btnExcel" class="btn-sm" style="background:#217346" onclick="exportarExcel()">📊 Excel</button>
        <input type="password" id="adminPass" placeholder="Clave Admin" style="width: 100px; padding: 5px;">
        <button class="btn-sm" style="background:#6c757d" onclick="verificarAcceso()">Entrar</button>
    </div>
</div>

<div class="main-content">
    <div id="mapAgenda"></div>
    <div class="floating-panel">
        <input type="text" id="buscador" style="padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd" placeholder="🔍 Filtrar ciudad o nombre..." onkeyup="renderCards()">
        <div id="status" style="font-size: 11px; color: var(--primary); margin-bottom: 10px; font-weight: bold;"></div>
        <div class="tech-list" id="lista-tecnicos"></div>
    </div>
</div>

<div id="modalReg" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Registrar Técnico</h3>
        <div id="mapAdmin" style="height: 180px; border-radius: 8px; margin-bottom: 10px;"></div>
        <div class="form-grid">
            <input type="hidden" id="editIndex">
            <input type="text" id="rNombre" class="full" placeholder="Nombre completo">
            <input type="text" id="rUbi" placeholder="Ciudad/Vereda">
            <input type="text" id="rEsp" placeholder="Especialidad">
            <input type="text" id="rTel" class="full" placeholder="Teléfono de contacto">
            <input type="text" id="rLat" placeholder="Latitud" readonly>
            <input type="text" id="rLng" placeholder="Longitud" readonly>
        </div>
        <button class="btn-sm" style="background:var(--primary); width:100%; margin-top:15px; padding:12px;" onclick="guardarTecnico()">Confirmar Datos</button>
        <button class="btn-sm" style="background:#666; width:100%; margin-top:5px; padding:10px;" onclick="cerrarModal()">Cancelar</button>
    </div>
</div>

<script>
    let isAdmin = false;
    let dbTecnicos = [
        { nombre: "Sede Barranquilla", ubi: "Barranquilla, Atl.", esp: "Soporte Central", tel: "300123", lat: 10.96, lng: -74.79 },
        { nombre: "Juan Técnico", ubi: "Medellín, Ant.", esp: "Mecánica IoT", tel: "311444", lat: 6.24, lng: -75.58 }
    ];

    const map = L.map('mapAgenda').setView([4.57, -74.29], 5);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);

    let mapAdmin, markerAdmin;

    function verificarAcceso() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "admin123") { // CAMBIA TU CLAVE AQUÍ
            isAdmin = true;
            document.getElementById('btnNewTech').style.display = 'block';
            alert("Acceso concedido. Ahora puedes agregar, editar y eliminar.");
        } else {
            isAdmin = false;
            document.getElementById('btnNewTech').style.display = 'none';
            alert("Clave incorrecta.");
        }
        renderCards();
    }

    function renderCards(idCercano = null) {
        const lista = document.getElementById('lista-tecnicos');
        const query = document.getElementById('buscador').value.toLowerCase();
        lista.innerHTML = "";
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

        dbTecnicos.forEach((t, i) => {
            if(!t.nombre.toLowerCase().includes(query) && !t.ubi.toLowerCase().includes(query)) return;

            const esCercano = (i === idCercano);
            const card = document.createElement('div');
            card.className = `tech-card ${esCercano ? 'active' : ''}`;
            card.innerHTML = `
                <h4>${t.nombre}</h4>
                <p>📍 ${t.ubi}</p>
                <p>🛠️ ${t.esp}</p>
                <div class="admin-controls" style="display:${isAdmin ? 'flex' : 'none'}">
                    <button class="btn-sm btn-edit" onclick="editarTecnico(${i})">✏️</button>
                    <button class="btn-sm btn-del" onclick="eliminarTecnico(${i})">🗑️</button>
                </div>
            `;
            lista.appendChild(card);
            
            L.marker([t.lat, t.lng], {
                icon: L.icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${esCercano ? 'green' : 'blue'}.png`,
                    iconSize: [25, 41], iconAnchor: [12, 41]
                })
            }).addTo(map).bindPopup(t.nombre);
        });
    }

    function abrirModal(index = -1) {
        document.getElementById('modalReg').style.display = 'block';
        document.getElementById('editIndex').value = index;
        document.getElementById('modalTitle').innerText = index === -1 ? "Registrar Técnico" : "Editar Técnico";
        
        if(index !== -1) {
            const t = dbTecnicos[index];
            document.getElementById('rNombre').value = t.nombre;
            document.getElementById('rUbi').value = t.ubi;
            document.getElementById('rEsp').value = t.esp;
            document.getElementById('rTel').value = t.tel;
            document.getElementById('rLat').value = t.lat;
            document.getElementById('rLng').value = t.lng;
        }

        if(!mapAdmin) {
            mapAdmin = L.map('mapAdmin').setView([10.9, -74.7], 11);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}').addTo(mapAdmin);
            markerAdmin = L.marker([10.9, -74.7], {draggable:true}).addTo(mapAdmin);
            mapAdmin.on('click', e => {
                markerAdmin.setLatLng(e.latlng);
                document.getElementById('rLat').value = e.latlng.lat.toFixed(6);
                document.getElementById('rLng').value = e.latlng.lng.toFixed(6);
            });
        }
    }

    function guardarTecnico() {
        const index = parseInt(document.getElementById('editIndex').value);
        const data = {
            nombre: document.getElementById('rNombre').value,
            ubi: document.getElementById('rUbi').value,
            esp: document.getElementById('rEsp').value,
            tel: document.getElementById('rTel').value,
            lat: parseFloat(document.getElementById('rLat').value),
            lng: parseFloat(document.getElementById('rLng').value)
        };

        if(index === -1) dbTecnicos.push(data);
        else dbTecnicos[index] = data;

        renderCards();
        cerrarModal();
    }

    function eliminarTecnico(i) {
        if(confirm("¿Estás seguro de eliminar este registro?")) {
            dbTecnicos.splice(i, 1);
            renderCards();
        }
    }

    function editarTecnico(i) { abrirModal(i); }

    function cerrarModal() { 
        document.getElementById('modalReg').style.display = 'none';
        document.querySelectorAll('input:not([type=password])').forEach(i => i.value = "");
    }

    map.on('click', e => {
        let min = Infinity, idx = -1;
        dbTecnicos.forEach((t, i) => {
            let d = Math.sqrt(Math.pow(e.latlng.lat - t.lat, 2) + Math.pow(e.latlng.lng - t.lng, 2));
            if(d < min) { min = d; idx = i; }
        });
        renderCards(idx);
    });

    renderCards();
</script>
</body>
</html>
