<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png">
    <title>SNT Datatrack | Agenda Nacional de Técnicos</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #002b5c; --accent: #00d2ff; --success: #25d366; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        
        .header { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .search-bar { background: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1050; display: flex; gap: 10px; align-items: center; }
        
        #mapAgenda { flex: 1; z-index: 1; }

        /* Contenedor de Tarjetas Flotantes (Carrusel) */
        .results-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; gap: 15px; padding: 10px; z-index: 1000;
            max-width: 95vw; overflow-x: auto; scroll-behavior: smooth;
        }
        
        .floating-card { 
            min-width: 280px; background: white; border-radius: 15px; padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 5px solid var(--accent);
            position: relative; flex-shrink: 0;
        }

        .card-rank { position: absolute; top: 10px; right: 15px; background: var(--primary); color: white; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-ws { background: var(--success); color: white; text-decoration: none; display: block; text-align: center; margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 13px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 400px; border-radius: 12px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-bottom: 12px; box-sizing: border-box; }
        
        /* Ocultar scrollbar pero permitir scroll */
        .results-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div><b>DATATRACK</b> | Agenda Nacional de Técnicos | <b> by: Ing Vidal</b> </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn" style="background:#217346; color:white;" onclick="exportarExcel()">📊 Exportar Excel</button>
        <button id="btnNew" class="btn" style="background:var(--accent); display:none;" onclick="abrirModal()">➕ Nuevo</button>
        <input type="password" id="pass" placeholder="Admin" style="width: 70px; height: 30px; margin:0;">
        <button class="btn" style="background:#6c757d; color:white;" onclick="login()">Entrar</button>
    </div>
</div>

<div class="search-bar">
    <input type="text" id="busc" placeholder="🔍 Escribe ciudad, vereda o nombre del técnico..." style="flex:1; margin:0;">
    <button class="btn" style="background:var(--primary); color:white;" onclick="ejecutarBusqueda()">BUSCAR</button>
</div>

<div id="mapAgenda"></div>

<div id="resultsWrapper" class="results-container"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Registrar Técnico</h3>
        <input type="text" id="rNom" placeholder="Nombre completo">
        <input type="text" id="rUbi" placeholder="Ciudad">
        <input type="text" id="rEsp" placeholder="Especialidad">
        <input type="text" id="rTel" placeholder="WhatsApp (ej: 57300...)">
        <div id="mapAdmin" style="height: 150px; background:#eee; margin-bottom:12px; border-radius:10px;"></div>
        <input type="text" id="rLat" placeholder="Latitud" readonly>
        <input type="text" id="rLng" placeholder="Longitud" readonly>
        <button class="btn" style="background:var(--primary); color:white; width:100%; padding:15px;" onclick="guardar()">💾 GUARDAR EN FIREBASE</button>
        <button class="btn" style="background:#666; color:white; width:100%; margin-top:5px;" onclick="cerrarModal()">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAjh_N7X4nBi6GPnWjxegPX2SKZf7PxW-w",
      authDomain: "agenda-datatrack.firebaseapp.com",
      projectId: "agenda-datatrack",
      storageBucket: "agenda-datatrack.firebasestorage.app",
      messagingSenderId: "818633255134",
      appId: "1:818633255134:web:f0d7dfe7f5caf8c4607a4f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tecCol = collection(db, "tecnicos_nacional");

    onSnapshot(tecCol, (snap) => {
        window.dbTecnicos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        window.actualizarMapa();
    });

    window.fbAdd = (data) => addDoc(tecCol, data);
</script>

<script>
    let isAdmin = false; window.dbTecnicos = [];
    const map = L.map('mapAgenda').setView([10.96, -74.79], 6);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);

    function actualizarMapa() {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        window.dbTecnicos.forEach(t => { L.marker([t.lat, t.lng]).addTo(map).bindPopup(`<b>${t.nombre}</b><br>${t.ubi}`); });
    }

    // Lógica para encontrar los 3 más cercanos
    function mostrarTop3(lat, lng, titulo) {
        if(window.dbTecnicos.length === 0) return;

        // Calcular distancias y ordenar
        const calculados = window.dbTecnicos.map(t => ({
            ...t,
            dist: map.distance([lat, lng], [t.lat, t.lng])
        })).sort((a, b) => a.dist - b.dist).slice(0, 3);

        const wrapper = document.getElementById('resultsWrapper');
        wrapper.innerHTML = "";
        wrapper.style.display = 'flex';

        calculados.forEach((t, i) => {
            const card = document.createElement('div');
            card.className = "floating-card";
            card.innerHTML = `
                <div class="card-rank">#${i+1}</div>
                <small style="color:var(--primary); font-weight:bold;">${i === 0 ? 'MÁS CERCANO' : 'OPCIÓN APOYO'}</small>
                <h3 style="margin:5px 0; font-size:16px;">${t.nombre}</h3>
                <p style="margin:2px 0; font-size:13px;">📍 ${t.ubi} (${(t.dist/1000).toFixed(1)} km)</p>
                <p style="margin:2px 0; font-size:13px;">🔧 ${t.esp}</p>
                <a href="https://wa.me/${t.tel}?text=Hola%20${t.nombre},%20requerimos%20tu%20apoyo%20para%20un%20servicio..." 
                   target="_blank" class="btn-ws">💬 Contactar</a>
            `;
            card.onclick = () => map.flyTo([t.lat, t.lng], 13);
            wrapper.appendChild(card);
        });

        map.flyTo([lat, lng], 10);
    }

    map.on('click', e => mostrarTop3(e.latlng.lat, e.latlng.lng, "tu clic"));

    async function ejecutarBusqueda() {
        const query = document.getElementById('busc').value;
        if(query.length < 3) return alert("Escribe una ciudad o nombre");
        
        try {
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query},Colombia`);
            const data = await resp.json();
            if(data.length > 0) {
                mostrarTop3(parseFloat(data[0].lat), parseFloat(data[0].lon), query);
            } else { alert("Ubicación no encontrada."); }
        } catch(e) { alert("Error en búsqueda."); }
    }

    function login() { if(document.getElementById('pass').value === "admin123") { isAdmin = true; document.getElementById('btnNew').style.display = 'block'; alert("Acceso Admin"); } }
    
    let mapAdmin, markerAdmin;
    function abrirModal() {
        document.getElementById('modal').style.display = 'block';
        setTimeout(() => {
            if(!mapAdmin) {
                mapAdmin = L.map('mapAdmin').setView([10.96, -74.79], 10);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}').addTo(mapAdmin);
                markerAdmin = L.marker([10.96, -74.79], {draggable:true}).addTo(mapAdmin);
                mapAdmin.on('click', ev => {
                    markerAdmin.setLatLng(ev.latlng);
                    document.getElementById('rLat').value = ev.latlng.lat.toFixed(6);
                    document.getElementById('rLng').value = ev.latlng.lng.toFixed(6);
                });
            }
        }, 300);
    }

    async function guardar() {
        const data = { nombre: document.getElementById('rNom').value, ubi: document.getElementById('rUbi').value, esp: document.getElementById('rEsp').value, tel: document.getElementById('rTel').value, lat: parseFloat(document.getElementById('rLat').value), lng: parseFloat(document.getElementById('rLng').value) };
        await window.fbAdd(data);
        cerrarModal();
    }
    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }
    function exportarExcel() { const ws = XLSX.utils.json_to_sheet(window.dbTecnicos.map(t => ({Nombre: t.nombre, Ciudad: t.ubi, Especialidad: t.esp, Telefono: t.tel}))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Tecnicos_Datatrack"); XLSX.writeFile(wb, "SNT_Nacional.xlsx"); }

    document.getElementById('pass').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
    document.getElementById('busc').addEventListener('keypress', e => { if (e.key === 'Enter') ejecutarBusqueda(); });
</script>
</body>
</html>
